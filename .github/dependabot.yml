version: 2
updates:
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    labels: ["dependencies"]
    groups:
      github-actions-ci:
        patterns: ["*"]
  - package-ecosystem: gradle
    directory: "/android"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    labels: ["dependencies"]
    groups:
      gradle-app:
        patterns: ["*"]
