name: build-release

# Builds self-contained Linux + Windows executables (PyInstaller) and the
# Android debug APK (Gradle), and attaches all three to a GitHub Release
# whenever a v* tag is pushed.
#   git tag v0.1 && git push origin v0.1
# Manual run (Actions tab -> Run workflow) just builds + uploads artifacts.

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            asset: socmap-linux-x64
            out: dist/socmap
          - os: windows-latest
            asset: socmap-windows-x64.exe
            out: dist/socmap.exe
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v7
        with:
          python-version: '3.12'

      - name: Install PyInstaller
        run: python -m pip install --upgrade pip pyinstaller

      - name: Build
        run: pyinstaller socmap.spec

      - name: Stage artifact
        shell: bash
        run: |
          mkdir -p out
          cp "${{ matrix.out }}" "out/${{ matrix.asset }}"
          cp .env.example out/.env.example
          cp README.md out/README.md

      - uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.asset }}
          path: out/*
          retention-days: 7

      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v3
        with:
          files: out/${{ matrix.asset }}

  android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'

      - uses: android-actions/setup-android@v4

      - name: Build debug APK
        working-directory: android
        run: ./gradlew :app:assembleDebug

      - name: Stage APK
        run: |
          mkdir -p out
          cp android/app/build/outputs/apk/debug/app-debug.apk out/socmap-android.apk

      - uses: actions/upload-artifact@v7
        with:
          name: socmap-android.apk
          path: out/socmap-android.apk
          retention-days: 7

      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v3
        with:
          files: out/socmap-android.apk
